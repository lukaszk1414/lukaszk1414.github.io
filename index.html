<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Start • Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

  <header class="topbar">
    <div class="brand">
      <div class="brand-dot"></div>
      <div>
        <div class="brand-title">Dashboard</div>
        <div class="brand-sub" id="subtitle">Ładowanie…</div>
      </div>
    </div>
    <div class="clock-block">
      <div class="time" id="time">--:--</div>
      <div class="date" id="date">ładowanie</div>
    </div>
  </header>

  <main class="grid">

    <section class="card card-weather">
      <div class="card-head">
        <span class="card-label">Pogoda</span>
        <span class="pill" id="weatherPlace">—</span>
      </div>
      <div class="weather-body">
        <div class="weather-top">
          <div class="temp" id="temp">—°</div>
          <div class="weather-right">
            <div class="weather-desc" id="weatherDesc">—</div>
            <div class="weather-grid">
              <div class="wkv">
                <div class="wkv-label">Odczuwalna</div>
                <div class="wkv-val" id="apparent">—</div>
              </div>
              <div class="wkv">
                <div class="wkv-label">Wiatr</div>
                <div class="wkv-val" id="wind">—</div>
              </div>
              <div class="wkv">
                <div class="wkv-label">Opady</div>
                <div class="wkv-val" id="precip">—</div>
              </div>
              <div class="wkv">
                <div class="wkv-label">Aktualizacja</div>
                <div class="wkv-val" id="weatherUpdated">—</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="card card-radio">
      <div class="card-head">
        <span class="card-label">Radio</span>
        <span class="pill" id="nowPlaying">Nie gra</span>
      </div>
      <div class="radio-controls">
        <button class="btn btn-action" id="btnStop" title="Stop">⏹ Stop</button>
        <button class="btn btn-action" id="btnToggle" title="Pauza/Wznów" disabled>⏯ Pauza</button>
        <div class="volume-wrap">
          <span class="vol-label">Vol</span>
          <input id="vol" type="range" min="0" max="1" step="0.01" value="0.7" class="volume-slider" />
        </div>
      </div>
      <div class="visualizer" id="visualizer">
        <span class="bar"></span><span class="bar"></span><span class="bar"></span>
        <span class="bar"></span><span class="bar"></span><span class="bar"></span>
        <span class="bar"></span><span class="bar"></span><span class="bar"></span>
        <span class="bar"></span><span class="bar"></span><span class="bar"></span>
      </div>
      <div class="stations" id="stations"></div>
      <audio id="audio" preload="none"></audio>
    </section>

    <section class="card card-links">
      <div class="card-head">
        <span class="card-label">Skróty</span>
        <span class="pill">Ulubione</span>
      </div>
      <div class="quicklinks" id="quicklinks"></div>
    </section>

    <section class="card card-fx">
      <div class="card-head">
        <span class="card-label">Kursy walut</span>
        <span class="pill">NBP</span>
      </div>
      <div class="fx-body">
        <div class="fx-item">
          <div class="fx-pair">USD <span class="fx-sep">/</span> PLN</div>
          <div class="fx-value" id="usdpln">—</div>
          <div class="fx-hint" id="fxDate">—</div>
        </div>
        <div class="fx-divider"></div>
        <div class="fx-item">
          <div class="fx-pair">EUR <span class="fx-sep">/</span> PLN</div>
          <div class="fx-value" id="eurpln">—</div>
          <div class="fx-hint" id="fxNo">—</div>
        </div>
      </div>
    </section>

    <section class="card card-metals">
      <div class="card-head">
        <span class="card-label">Kruszce</span>
        <span class="pill">NBP · Stooq</span>
      </div>
      <div class="metals-body">
        <div class="metal-item gold-item">
          <div class="metal-symbol">Au</div>
          <div class="metal-info">
            <div class="metal-label">Złoto · PLN/g</div>
            <div class="metal-value" id="goldPlnG">—</div>
            <div class="metal-hint" id="goldDate">—</div>
          </div>
        </div>
        <div class="metal-item silver-item">
          <div class="metal-symbol">Ag</div>
          <div class="metal-info">
            <div class="metal-label">Srebro · PLN/oz</div>
            <div class="metal-value" id="silverPlnOz">—</div>
            <div class="metal-hint">przeliczone USD→PLN</div>
          </div>
        </div>
      </div>
    </section>

    <section class="card card-news">
      <div class="card-head">
        <span class="card-label">Newsy</span>
        <div class="tabs" role="tablist" aria-label="Newsy">
          <button class="tab active" data-tab="sport">Sport</button>
          <button class="tab" data-tab="news">Wiadomości</button>
        </div>
      </div>
      <div class="tabpanels">
        <div class="panel active" id="panel-sport">
          <ul class="list" id="listSport"></ul>
        </div>
        <div class="panel" id="panel-news">
          <ul class="list" id="listNews"></ul>
        </div>
      </div>
    </section>

  </main>

  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="app.js"></script>
  <script>
    (function(){
      const audio = document.getElementById('audio');
      audio.addEventListener('play', () => document.body.classList.add('playing'));
      audio.addEventListener('pause', () => document.body.classList.remove('playing'));
      audio.addEventListener('ended', () => document.body.classList.remove('playing'));
    })();
  </script>
</body>
</html>
